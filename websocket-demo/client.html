<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eksperimen WebSocket - Real Time Chat</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom config untuk mengubah tema default -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'whatsapp-green': '#25D366',
                        'whatsapp-dark': '#075E54',
                        'whatsapp-light': '#128C7E',
                    }
                }
            }
        }
    </script>
    <!-- Font Awesome Icons (opsional, untuk ikon) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Custom scrollbar tetap perlu karena Tailwind tidak menyediakan */
        .chat-box::-webkit-scrollbar {
            width: 6px;
        }
        .chat-box::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        .chat-box::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 10px;
        }
        .chat-box::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-purple-600 to-indigo-700 h-screen flex items-center justify-center font-sans">

    <!-- Container Chat -->
    <div class="w-[500px] max-w-[90%] h-[85vh] bg-white rounded-2xl shadow-2xl flex flex-col overflow-hidden">

        <!-- Header -->
        <div class="bg-[#075E54] text-white p-4 text-center">
            <h1 class="text-lg font-semibold">
                <i class="fa-brands fa-rocketchat mr-2"></i>
                WebSocket Real-Time Chat
            </h1>
            <p class="text-xs opacity-90 mt-1">Eksperimen Komunikasi Dua Arah</p>
        </div>

        <!-- User Info Bar -->
        <div class="bg-[#128C7E] px-4 py-2 flex justify-between text-white text-sm">
            <div>
                <i class="fa-regular fa-user mr-1"></i>
                <span id="myUserName" class="font-medium">Memuat...</span>
            </div>
            <div>
                <i class="fa-solid fa-circle text-[#25D366] text-xs mr-1"></i>
                Online
            </div>
        </div>

        <!-- Status -->
        <div id="status" class="mx-4 mt-3 px-3 py-2 text-xs rounded-full text-center bg-gray-100 text-gray-600 transition-all">
            <i class="fa-solid fa-spinner fa-pulse mr-1"></i>
            Menghubungkan ke server...
        </div>

        <!-- Chat Box (Area Pesan) -->
        <div class="chat-box flex-1 overflow-y-auto p-4 bg-[#E5DDD5] space-y-3" id="chatBox">
            <!-- Pesan akan muncul di sini via JavaScript -->
        </div>

        <!-- Input Area -->
        <div class="bg-gray-100 p-4 flex gap-2 border-t border-gray-300">
            <input type="text" id="messageInput" placeholder="Ketik pesan..." disabled
                class="flex-1 px-4 py-2 rounded-full border border-gray-300 focus:outline-none focus:ring-2 focus:ring-[#128C7E] disabled:bg-gray-200 disabled:cursor-not-allowed">
            <button id="sendBtn" disabled
                class="bg-[#128C7E] hover:bg-[#075E54] disabled:bg-gray-400 disabled:cursor-not-allowed text-white px-5 py-2 rounded-full transition font-semibold">
                <i class="fa-regular fa-paper-plane mr-1"></i>
                Kirim
            </button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusDiv = document.getElementById('status');
        const myUserNameSpan = document.getElementById('myUserName');

        let ws = null;
        let myUserId = null;
        let myUserName = '';

        // Generate nama user unik
        function generateUserName() {
            const names = ['Alice', 'Bob', 'Charlie', 'Diana', 'Eve', 'Frank', 'Grace', 'Henry', 'Ivy', 'Jack'];
            const randomName = names[Math.floor(Math.random() * names.length)];
            const randomNum = Math.floor(Math.random() * 100);
            return `${randomName}${randomNum}`;
        }

        // Escape HTML untuk keamanan
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Format waktu
        function getTime() {
            return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        // Menambahkan pesan ke chat box
        function addMessage(messageData) {
            const msgDiv = document.createElement('div');
            const time = messageData.timestamp || getTime();
            
            if (messageData.type === 'system') {
                // System message - tengah
                msgDiv.className = 'flex justify-center';
                msgDiv.innerHTML = `
                    <div class="bg-black/60 backdrop-blur-sm text-white text-xs px-4 py-1.5 rounded-full max-w-[80%] text-center">
                        <i class="fa-regular fa-bell mr-1"></i>
                        ${escapeHtml(messageData.message)}
                        <span class="text-gray-300 text-[10px] ml-2">${time}</span>
                    </div>
                `;
            } 
            else if (messageData.type === 'chat') {
                // Cek apakah pesan dari saya sendiri
                const isMe = (messageData.senderId === myUserId);
                
                if (isMe) {
                    // Pesan saya di KANAN
                    msgDiv.className = 'flex justify-end';
                    msgDiv.innerHTML = `
                        <div class="max-w-[70%]">
                            <div class="text-right text-xs text-gray-600 mb-1 mr-2">
                                <i class="fa-regular fa-user mr-1"></i>Anda
                            </div>
                            <div class="bg-[#DCF8C6] rounded-2xl rounded-tr-sm px-4 py-2 shadow-sm">
                                <div class="text-sm break-words">${escapeHtml(messageData.message)}</div>
                                <div class="text-[10px] text-gray-500 text-right mt-1">${time}</div>
                            </div>
                        </div>
                    `;
                } else {
                    // Pesan orang lain di KIRI
                    msgDiv.className = 'flex justify-start';
                    msgDiv.innerHTML = `
                        <div class="max-w-[70%]">
                            <div class="text-left text-xs text-[#128C7E] font-semibold mb-1 ml-2">
                                <i class="fa-regular fa-user mr-1"></i>${escapeHtml(messageData.senderName || 'User')}
                            </div>
                            <div class="bg-white rounded-2xl rounded-tl-sm px-4 py-2 shadow-sm">
                                <div class="text-sm break-words">${escapeHtml(messageData.message)}</div>
                                <div class="text-[10px] text-gray-500 text-right mt-1">${time}</div>
                            </div>
                        </div>
                    `;
                }
            }
            
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function connectWebSocket() {
            ws = new WebSocket('ws://localhost:8080');

            ws.onopen = () => {
                statusDiv.innerHTML = '<i class="fa-regular fa-circle-check mr-1"></i> Terhubung ke server!';
                statusDiv.className = 'mx-4 mt-3 px-3 py-2 text-xs rounded-full text-center bg-green-100 text-green-700';
                messageInput.disabled = false;
                sendBtn.disabled = false;
                messageInput.focus();
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);

                if (data.type === 'init') {
                    myUserId = data.userId;
                    myUserName = generateUserName();
                    myUserNameSpan.textContent = myUserName;

                    // Kirim nama ke server
                    ws.send(JSON.stringify({
                        type: 'setName',
                        userId: myUserId,
                        name: myUserName
                    }));

                    addMessage({
                        type: 'system',
                        message: `Anda bergabung sebagai ${myUserName}`,
                        timestamp: getTime()
                    });
                }
                else if (data.type === 'chat') {
                    addMessage({
                        type: 'chat',
                        senderId: data.senderId,
                        senderName: data.senderName,
                        message: data.message,
                        timestamp: data.timestamp
                    });
                }
                else if (data.type === 'system') {
                    addMessage({
                        type: 'system',
                        message: data.message,
                        timestamp: data.timestamp
                    });
                }
            };

            ws.onerror = () => {
                statusDiv.innerHTML = '<i class="fa-regular fa-circle-xmark mr-1"></i> Error koneksi! Pastikan server berjalan di port 8080.';
                statusDiv.className = 'mx-4 mt-3 px-3 py-2 text-xs rounded-full text-center bg-red-100 text-red-700';
            };

            ws.onclose = () => {
                statusDiv.innerHTML = '<i class="fa-regular fa-circle-exclamation mr-1"></i> Koneksi terputus. Refresh halaman.';
                statusDiv.className = 'mx-4 mt-3 px-3 py-2 text-xs rounded-full text-center bg-yellow-100 text-yellow-700';
                messageInput.disabled = true;
                sendBtn.disabled = true;
            };
        }

        function sendMessage() {
            const text = messageInput.value.trim();
            if (text === '' || !ws || ws.readyState !== WebSocket.OPEN) return;

            ws.send(JSON.stringify({
                type: 'chat',
                message: text,
                senderId: myUserId,
                senderName: myUserName
            }));

            messageInput.value = '';
            messageInput.focus();
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        connectWebSocket();
    </script>

</body>
</html>
